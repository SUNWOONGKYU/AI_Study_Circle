<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 44" width="240" height="44">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C9A961"/>
      <stop offset="50%" stop-color="#E8D9B0"/>
      <stop offset="100%" stop-color="#A88838"/>
    </linearGradient>
  </defs>

  <!-- WAAT wordmark -->
  <text x="0" y="34"
    font-family="'Outfit', 'Inter', system-ui, sans-serif"
    font-size="36" font-weight="900"
    letter-spacing="2"
    fill="#1A2238">W<tspan fill="url(#goldGrad)">AA</tspan>T</text>

  <!-- AI 마크: 네트워크 노드 패턴 (WAAT 우측) -->
  <g transform="translate(196, 8)" fill="none" stroke="url(#goldGrad)" stroke-width="1.6" stroke-linecap="round">
    <!-- 연결선 -->
    <line x1="4"  y1="6"  x2="16" y2="2"/>
    <line x1="4"  y1="6"  x2="14" y2="14"/>
    <line x1="4"  y1="6"  x2="20" y2="20"/>
    <line x1="16" y1="2"  x2="20" y2="20"/>
    <line x1="14" y1="14" x2="20" y2="20"/>
  </g>
  <g transform="translate(196, 8)" fill="url(#goldGrad)" stroke="none">
    <!-- 노드 4개 -->
    <circle cx="4"  cy="6"  r="2.2"/>
    <circle cx="16" cy="2"  r="2.2"/>
    <circle cx="14" cy="14" r="2.2"/>
    <circle cx="20" cy="20" r="2.2"/>
  </g>
</svg>
