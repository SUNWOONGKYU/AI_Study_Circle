<!DOCTYPE html>

<body class="speakup-light">

    <!-- Navigation -->
    <nav>
        <div class="nav-inner">
            <a href="index.html" class="nav-logo">
                <img src="logo-waat.png?v=20260510i" alt="WAAT — Wednesday Afternoon AI Talk" class="nav-logo-img">
            </a>
            <ul class="nav-links nav-links-center">
                <li><a href="index.html#schedule">Schedule</a></li>
                <li><a href="index.html#location">Location</a></li>
                <li><a href="speakup.html">Free Talk</a></li>

            <ul class="nav-links nav-links-right">
                <li id="nav-login-link"><a href="index.html" class="nav-login-btn">Login</a></li>

                <li id="nav-user-menu" class="nav-user-menu" style="display:none;">

                    </div>
                </li>
            </ul>
            <button class="mobile-menu-btn" aria-label="메뉴 열기">☰</button>
        </div>

    <!-- Profile Content -->
    <section class="speakup-page">
        <div class="section-inner">
            <h2 class="section-title">내 프로필 <span class="section-title-en">My Profile</span></h2>

            <!-- 비로그인 안내 -->
            <div id="profile-login-prompt" class="post-login-prompt" style="display:none;">
                <p><a href="index.html" class="speakup-login-link">로그인</a>이 필요합니다.</p>
            </div>

            <!-- 프로필 카드 -->
            <div id="profile-card" class="profile-card" style="display:none;">
                <div class="profile-row"><span class="profile-key">이름</span><span class="profile-val" id="pf-name">—</span></div>
                <div class="profile-row"><span class="profile-key">이메일</span><span class="profile-val" id="pf-email">—</span></div>
                <div class="profile-row"><span class="profile-key">전화번호</span><span class="profile-val" id="pf-phone">—</span></div>
                <div class="profile-row"><span class="profile-key">가입일</span><span class="profile-val" id="pf-created">—</span></div>
            </div>

            <h3 class="profile-section-title">📅 내 신청 내역</h3>
            <div id="my-attendances" class="my-attendances-list">
